name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================================
  # Java Backend - Build & Test
  # ============================================================
  java-build:
    name: Java Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build (skip tests)
        run: mvn clean compile -DskipTests -B -q

      - name: Run Unit Tests
        run: mvn test -Dspring.profiles.active=test -B

      - name: Run Checkstyle
        run: mvn checkstyle:check -B || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results
          path: '**/target/surefire-reports/'

  # ============================================================
  # Python Services - Lint & Test
  # ============================================================
  python-checks:
    name: Python Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest black mypy

      - name: Lint Python
        run: |
          flake8 . --count --max-line-length=100 --extend-ignore=E203,W503 \
            --exclude=node_modules,.git,__pycache__,build,dist

      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./node_modules/*" \
            -exec python -m py_compile {} \; && echo "All Python files OK"

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports --exclude "node_modules|.git|build" || true

  # ============================================================
  # Frontend - Build & Lint
  # ============================================================
  frontend-checks:
    name: Frontend Vue
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uav-path-planning-system/frontend-vue
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: uav-path-planning-system/frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # ============================================================
  # Security Scan
  # ============================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: mvn dependency-check:check -DskipTests=true || true

      - name: Security Audit
        run: python tests/check_security.py || true

  # ============================================================
  # Deployment
  # ============================================================
  deploy:
    name: Deploy
    needs: [java-build, python-checks, frontend-checks, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build --parallel

      - name: Push to registry
        run: |
          echo "Images ready for deployment"
        # In production, add: docker compose push
