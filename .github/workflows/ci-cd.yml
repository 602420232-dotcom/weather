name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  MAVEN_OPTS: "-Xmx512m"
  JAVA_VERSION: "17"
  FLUTTER_VERSION: "3.16.0"
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn compile -q

      - name: Run Unit Tests
        run: mvn test -q

      - name: Generate JaCoCo Report
        run: mvn jacoco:report -q

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'

  flutter-build:
    name: Flutter Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Flutter analyze
        working-directory: uav-mobile-app
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

      - name: Build Web
        working-directory: uav-mobile-app
        run: flutter build web --release

      - name: Build Android APK
        working-directory: uav-mobile-app
        run: |
          flutter build apk --release
        env:
          FLUTTER_VERSION: ${{ env.FLUTTER_VERSION }}

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: uav-mobile-app/build/web/

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-android-apk
          path: uav-mobile-app/build/app/outputs/flutter-apk/app-release.apk

  quality:
    name: SonarQube Quality Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with JaCoCo
        run: mvn verify jacoco:report -q

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  dependency-check:
    name: OWASP Dependency Check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run OWASP Dependency Check
        run: mvn dependency-check:check -q

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: '**/target/dependency-check-reports/'

  security-scan:
    name: Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitHub Security CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          languages: Java, Python, Dart, JavaScript
          queries: security-extended
          category: "/language:{${{ matrix.language }}"

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for Secrets in Code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

  notify-dev:
    name: Notify Development Build Ready
    needs: [quality, dependency-check, flutter-build]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Build Success
        run: |
          echo "✅ Development build completed successfully!"
          echo "📋 Build: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🔗 Repository: ${{ github.repository }}"
          echo ""
          echo "📦 Docker images ready:"
          echo "   - ghcr.io/${{ github.repository }}/uav-platform-service:dev-${{ env.IMAGE_TAG }}"
          echo "   - ghcr.io/${{ github.repository }}/api-gateway:dev-${{ env.IMAGE_TAG }}"
          echo ""
          echo "⏭️  GitOps pipeline will deploy to development cluster via ArgoCD"

  stub-deploy-prod:
    name: Production Deployment (Stub)
    needs: [quality, dependency-check, flutter-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Production Build Ready
        run: |
          echo "⚠️  Production deployment is handled by GitOps pipeline"
          echo "📋 Build: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo ""
          echo "⏭️  ArgoCD will sync production deployment automatically"
          echo "📖 See gitops.yml for production deployment workflow"
