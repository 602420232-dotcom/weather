name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# GitHub Container Registry 推送需要 packages: write + attestation 权限
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ===== Job 1: Java 后端编译与测试 =====
  java-build:
    name: Java Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Install root POM
        run: mvn install -N -B -q

      - name: Build common-utils
        run: mvn install -pl common-utils -DskipTests -B -q

      - name: Compile all modules
        run: mvn compile -B -q

      - name: Run tests
        run: mvn test -B

  # ===== Job 2: Python 语法检查 =====
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check Python scripts
        run: ruff check .

  # ===== Job 3: 前端构建 =====
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: uav-path-planning-system/frontend-vue
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: uav-path-planning-system/frontend-vue/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

  # ===== Job 4: Docker 镜像构建与推送 =====
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [java-build, frontend-build]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      # ----- Java 微服务 -----
      - name: Build & Push API Gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:${{ github.sha }},ghcr.io/${{ github.repository }}/api-gateway:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push UAV Platform
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./uav-platform-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/uav-platform:${{ github.sha }},ghcr.io/${{ github.repository }}/uav-platform:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push WRF Processor
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./wrf-processor-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/wrf-processor:${{ github.sha }},ghcr.io/${{ github.repository }}/wrf-processor:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Data Assimilation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./data-assimilation-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/data-assimilation:${{ github.sha }},ghcr.io/${{ github.repository }}/data-assimilation:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Meteor Forecast
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./meteor-forecast-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/meteor-forecast:${{ github.sha }},ghcr.io/${{ github.repository }}/meteor-forecast:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Path Planning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./path-planning-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/path-planning:${{ github.sha }},ghcr.io/${{ github.repository }}/path-planning:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Weather Collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./uav-weather-collector/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/weather-collector:${{ github.sha }},ghcr.io/${{ github.repository }}/weather-collector:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./uav-path-planning-system/frontend-vue
          file: ./uav-path-planning-system/frontend-vue/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend-app:${{ github.sha }},ghcr.io/${{ github.repository }}/frontend-app:latest
          provenance: false
          cache-from: type=gha

      # ----- Python / AI 服务 -----
      - name: Build & Push FengWu Service
        uses: docker/build-push-action@v6
        with:
          context: ./fengwu-service
          file: ./fengwu-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/fengwu-service:${{ github.sha }},ghcr.io/${{ github.repository }}/fengwu-service:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Edge-Cloud Coordinator
        uses: docker/build-push-action@v6
        with:
          context: ./edge-cloud-coordinator
          file: ./edge-cloud-coordinator/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/edge-cloud:${{ github.sha }},ghcr.io/${{ github.repository }}/edge-cloud:latest
          provenance: false
          cache-from: type=gha

      - name: Build & Push Model Engine
        uses: docker/build-push-action@v6
        with:
          context: ./model-engine
          file: ./model-engine/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/model-engine:${{ github.sha }},ghcr.io/${{ github.repository }}/model-engine:latest
          provenance: false
          cache-from: type=gha
