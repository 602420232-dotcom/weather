name: GitOps CI/CD Pipeline

on:
  push:
    branches: [main, canary]
    paths:
      - 'wrf-processor-service/**'
      - 'meteor-forecast-service/**'
      - 'path-planning-service/**'
      - 'data-assimilation-service/**'
      - 'uav-platform-service/**'
      - 'api-gateway/**'
      - 'deployments/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Maven Tests
        run: mvn clean test -B

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Run Python Tests
        run: |
          pip install pytest numpy scipy scikit-learn
          pytest data-assimilation-platform/algorithm_core/tests/ -v --junitxml=test-report.xml
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: test-report.xml

  build-and-push:
    needs: test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        service:
          - wrf-processor-service
          - meteor-forecast-service
          - path-planning-service
          - data-assimilation-service
          - uav-platform-service
          - api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Update K8s Manifests
        run: |
          for service in wrf-processor-service meteor-forecast-service path-planning-service data-assimilation-service uav-platform-service api-gateway; do
            sed -i "s|image:.*$service.*|image: ${{ env.REGISTRY }}/${{ github.repository }}/$service:${{ env.IMAGE_TAG }}|g" \
              deployments/kubernetes/$service.yml
          done

      - name: Commit Updated Manifests
        run: |
          git config user.name "GitOps CI"
          git config user.email "ci@uav-platform.com"
          git add deployments/kubernetes/
          git commit -m "chore: auto-update images to ${{ env.IMAGE_TAG }} [skip ci]" || true
          git push

      - name: Sync ArgoCD
        run: |
          curl -X POST "https://argocd.uav-platform.com/api/v1/applications/uav-platform/sync" \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}"

  regression-test:
    needs: deploy
    runs-on: ubuntu-22.04
    steps:
      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check
        run: |
          for port in 8080 8081 8082 8083 8084 8088; do
            curl -sf "http://localhost:$port/actuator/health" || exit 1
          done

      - name: Run Regression Tests
        run: |
          pip install pytest requests
          pytest tests/regression/ -v
