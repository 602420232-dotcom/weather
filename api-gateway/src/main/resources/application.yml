server:
  port: 8088
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: classpath:health-config.yml
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: uav-platform
          uri: lb://uav-platform
          predicates:
            - Path=/api/platform/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@defaultRateLimiter}"
                status-code: TOO_MANY_REQUESTS
            - StripPrefix=1
        - id: path-planning
          uri: lb://path-planning
          predicates:
            - Path=/api/planning/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@defaultRateLimiter}"
            - StripPrefix=1
        - id: wrf-processor
          uri: lb://wrf-processor
          predicates:
            - Path=/api/wrf/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@defaultRateLimiter}"
            - StripPrefix=1
        - id: weather-collector
          uri: lb://uav-weather-collector
          predicates:
            - Path=/api/weather/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                rate-limiter: "#{@strictRateLimiter}"
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "Content-Type"
              - "Authorization"
              - "X-Requested-With"
              - "Accept"
              - "Origin"
              - "X-Request-ID"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@ipKeyResolver}"
            rate-limiter: "#{@defaultRateLimiter}"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
