name: 数据适配器测试

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: 设置Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: |
        pip install -r requirements.txt
        pip install psutil pytest  # 可选依赖
    
    - name: 运行测试
      run: python algorithm_core/examples/test_adapters.py --ci
      env:
        TF_ENABLE_ONEDNN_OPTS: 0  # 避免oneDNN警告
    
    - name: 上传测试报告
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: algorithm_core/examples/test_output/