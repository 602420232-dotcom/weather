apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bayesian-ingress
  namespace: bayesian-assimilation
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: bayesian-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bayesian-service
            port:
              number: 8084
