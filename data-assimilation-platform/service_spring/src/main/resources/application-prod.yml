server:
  port: 8094

spring:
  application:
    name: bayesian-assimilation-service
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/data_assimilation?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER:uav}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}

logging:
  level:
    com.uav.bayesian: INFO

python:
  service:
    url: ${PYTHON_SERVICE_URL:http://python-assimilation:8000}
