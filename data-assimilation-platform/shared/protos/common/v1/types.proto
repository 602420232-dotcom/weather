syntax = "proto3";

package common.v1;

option java_package = "com.uav.bayesian.common.v1";
option java_multiple_files = true;

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message LatLon {
  double latitude = 1;
  double longitude = 2;
}

message GeoPoint {
  double latitude = 1;
  double longitude = 2;
  double altitude = 3;
}

message GridIndex {
  int32 i = 1;
  int32 j = 2;
  int32 k = 3;
}
