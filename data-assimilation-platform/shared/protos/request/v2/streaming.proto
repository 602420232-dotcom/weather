syntax = "proto3";

package request.v2;

option java_package = "com.uav.bayesian.request.v2";
option java_multiple_files = true;

message StreamConfig {
  string stream_id = 1;
  int32 batch_size = 2;
  int32 max_buffer_seconds = 3;
}

message DataChunk {
  string stream_id = 1;
  int32 sequence_number = 2;
  bytes payload = 3;
  bool is_last = 4;
}
