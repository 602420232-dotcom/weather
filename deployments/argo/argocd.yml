apiVersion: v1
kind: Namespace
metadata:
  name: uav-platform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: uav-platform
data:
  url: https://argocd.uav-platform.com
  statusbadge.enabled: "true"

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uav-platform
  namespace: uav-platform
spec:
  project: default
  source:
    repoURL: https://github.com/uav-platform/uav-path-planning
    targetRevision: main
    path: deployments/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: uav-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
  sync:
    comparedTo:
      destination:
        namespace: uav-platform
        server: https://kubernetes.default.svc

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uav-platform-canary
  namespace: uav-platform
spec:
  project: default
  source:
    repoURL: https://github.com/uav-platform/uav-path-planning
    targetRevision: canary
    path: deployments/kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: uav-platform-canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: path-planning
  namespace: uav-platform
spec:
  replicas: 3
  strategy:
    canary:
      steps:
        - setWeight: 10
        - pause: { duration: 60s }
        - setWeight: 30
        - pause: { duration: 60s }
        - setWeight: 60
        - pause: { duration: 60s }
        - setWeight: 100
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: path-planning
  template:
    metadata:
      labels:
        app: path-planning
    spec:
      containers:
        - name: path-planning
          image: uav-registry/path-planning:latest
          ports:
            - containerPort: 8083
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8083 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8083 }
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 200m }
