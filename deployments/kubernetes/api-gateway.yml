apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: uav-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api-gateway
          image: trae-api-gateway:latest
          ports:
            - containerPort: 8088
              name: http
          envFrom:
            - configMapRef:
                name: uav-platform-config
          env:
            - name: NACOS_SERVER
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: NACOS_SERVER
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: REDIS_PORT
            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: uav-platform-config
                  key: JAVA_OPTS_API_GATEWAY
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8088 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8088 }
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 200m }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8088
      targetPort: 8088
