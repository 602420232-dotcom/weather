# ============================================================
# 核心服务部署清单（含资源限制和优雅关闭配置）
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: uav-platform
  labels:
    app: api-gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: api-gateway
          image: trae-api-gateway:${TAG:-1.0.0}
          ports:
            - containerPort: 8088
              name: http
          env:
            - name: SPRING_LIFECYCLE_TIMEOUT-PER-SHUTDOWN-PHASE
              value: "30s"
            - name: SERVER_SHUTDOWN
              value: graceful
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uav-platform
  namespace: uav-platform
  labels:
    app: uav-platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: uav-platform
  template:
    metadata:
      labels:
        app: uav-platform
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: uav-platform
          image: trae-uav-platform:${TAG:-1.0.0}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SPRING_LIFECYCLE_TIMEOUT-PER-SHUTDOWN-PHASE
              value: "30s"
            - name: SERVER_SHUTDOWN
              value: graceful
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: path-planning
  namespace: uav-platform
  labels:
    app: path-planning
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: path-planning
  template:
    metadata:
      labels:
        app: path-planning
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: path-planning
          image: path-planning-service:${TAG:-1.0.0}
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: SPRING_LIFECYCLE_TIMEOUT-PER-SHUTDOWN-PHASE
              value: "45s"
            - name: SERVER_SHUTDOWN
              value: graceful
          resources:
            requests:
              cpu: 500m      # increased from 300m
              memory: 1Gi    # increased from 512Mi
            limits:
              cpu: "2"
              memory: 2Gi    # increased from 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fengwu-service
  namespace: uav-platform
  labels:
    app: fengwu-service
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: fengwu-service
  template:
    metadata:
      labels:
        app: fengwu-service
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: fengwu-service
          image: fengwu-service:${TAG:-1.0.0}
          ports:
            - containerPort: 8085
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 8Gi    # increased from 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8085
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: uav-platform
spec:
  type: ClusterIP
  ports:
    - port: 8088
      targetPort: http
  selector:
    app: api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: uav-platform
  namespace: uav-platform
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
  selector:
    app: uav-platform
---
apiVersion: v1
kind: Service
metadata:
  name: path-planning
  namespace: uav-platform
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: http
  selector:
    app: path-planning
---
apiVersion: v1
kind: Service
metadata:
  name: fengwu-service
  namespace: uav-platform
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: http
  selector:
    app: fengwu-service
