apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-vue
  namespace: uav-path-planning
  labels:
    app: frontend-vue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend-vue
  template:
    metadata:
      labels:
        app: frontend-vue
    spec:
      containers:
      - name: frontend-vue
        image: frontend-vue:v1.0.0
        ports:
        - containerPort: 80
        env:
        - name: VUE_APP_API_URL
          value: "http://uav-platform:8080/api"
        - name: VUE_APP_WEBSOCKET_URL
          value: "ws://uav-platform:8080/ws"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 40
          periodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-vue
  namespace: uav-path-planning
spec:
  selector:
    app: frontend-vue
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
