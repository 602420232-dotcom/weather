﻿﻿﻿apiVersion: apps/v1
kind: Deployment
metadata:
  name: meteor-forecast
  namespace: uav-platform
  labels:
    app: meteor-forecast
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meteor-forecast
  template:
    metadata:
      labels:
        app: meteor-forecast
    spec:
      containers:
      - name: meteor-forecast
        image: meteor-forecast:v1.0.0
        ports:
        - containerPort: 8082
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: MODEL_PATH
          value: "/models"
        - name: DATA_PATH
          value: "/data/forecast"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 60
          periodSeconds: 20
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8082
          initialDelaySeconds: 120
          periodSeconds: 60
        volumeMounts:
        - name: model-data
          mountPath: /models
        - name: forecast-data
          mountPath: /data/forecast
      volumes:
      - name: model-data
        persistentVolumeClaim:
          claimName: model-data-pvc
      - name: forecast-data
        persistentVolumeClaim:
          claimName: forecast-data-pvc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: meteor-forecast
  namespace: uav-platform
spec:
  selector:
    app: meteor-forecast
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: meteor-forecast-hpa
  namespace: uav-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: meteor-forecast
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
