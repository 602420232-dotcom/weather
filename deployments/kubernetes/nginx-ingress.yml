apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uav-platform-ingress
  namespace: uav-path-planning
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: uav-platform.local
    http:
      paths:
      - path: /api/platform
        pathType: Prefix
        backend:
          service:
            name: uav-platform
            port:
              number: 8080
      - path: /api/forecast
        pathType: Prefix
        backend:
          service:
            name: meteor-forecast
            port:
              number: 8082
      - path: /api/planning
        pathType: Prefix
        backend:
          service:
            name: path-planning
            port:
              number: 8083
      - path: /api/wrf
        pathType: Prefix
        backend:
          service:
            name: wrf-processor
            port:
              number: 8081
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-vue
            port:
              number: 80