apiVersion: apps/v1
kind: Deployment
metadata:
  name: path-planning-service
  namespace: uav-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: path-planning-service
  template:
    metadata:
      labels:
        app: path-planning-service
    spec:
      containers:
        - name: wrf-processor
          image: trae-wrf-processor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          env:
            - name: NACOS_SERVER
              value: nacos:8848
            - name: DB_HOST
              value: mysql
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: spring.datasource.password
                  name: uav-platform-secrets
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication -XX:+ParallelRefProcEnabled"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: path-planning-service
  namespace: uav-platform
spec:
  selector:
    app: path-planning-service
  ports:
    - port: 8083
      targetPort: 8083
