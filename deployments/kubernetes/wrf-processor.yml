﻿﻿﻿﻿﻿﻿﻿apiVersion: apps/v1
kind: Deployment
metadata:
  name: wrf-processor
  namespace: uav-platform
  labels:
    app: wrf-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wrf-processor
  template:
    metadata:
      labels:
        app: wrf-processor
    spec:
      containers:
      - name: wrf-processor
        image: wrf-processor:v1.0.0
        ports:
        - containerPort: 8081
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: WRF_DATA_PATH
          value: "/data/wrf"
        - name: OUTPUT_PATH
          value: "/data/output"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 45
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 90
          periodSeconds: 45
        volumeMounts:
        - name: wrf-data
          mountPath: /data/wrf
        - name: output-data
          mountPath: /data/output
      volumes:
      - name: wrf-data
        persistentVolumeClaim:
          claimName: wrf-data-pvc
      - name: output-data
        persistentVolumeClaim:
          claimName: output-data-pvc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: wrf-processor
  namespace: uav-platform
spec:
  selector:
    app: wrf-processor
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
