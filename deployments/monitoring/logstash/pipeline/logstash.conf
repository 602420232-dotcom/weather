# Logstash Pipeline Configuration

input {
  # Beats input for Filebeat
  beats {
    port => 5044
    ssl => false
  }

  # TCP input for direct logging
  tcp {
    port => 5000
    codec => json_lines
  }

  # HTTP input for application logs
  http {
    port => 8080
    codec => json
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add timestamp if not present
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS", "UNIX_MS" ]
    target => "@timestamp"
  }

  # Add metadata
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:production}"
      "cluster" => "${CLUSTER:uav-platform}"
    }
  }

  # Process application logs
  if [logger_name] =~ /^com\.uav\./ {
    # Extract application name from logger
    grok {
      match => { "logger_name" => "^com\.uav\.(?<application>[^.]+)" }
      tag_on_failure => []
    }

    # Parse log levels
    if [level] =~ /ERROR/ {
      mutate {
        add_tag => [ "error" ]
        add_field => { "severity" => "error" }
      }
    } else if [level] =~ /WARN/ {
      mutate {
        add_tag => [ "warning" ]
        add_field => { "severity" => "warning" }
      }
    } else if [level] =~ /INFO/ {
      mutate {
        add_field => { "severity" => "info" }
      }
    } else if [level] =~ /DEBUG/ {
      mutate {
        add_tag => [ "debug" ]
        add_field => { "severity" => "debug" }
      }
    }

    # Extract stack trace if present
    if [stack_trace] {
      mutate {
        add_tag => [ "has_stack_trace" ]
      }
    }
  }

  # Process Python logs
  if [logger_name] =~ /^__main__/ or [filename] =~ /\.py$/ {
    mutate {
      add_field => {
        "application" => "python-service"
        "language" => "python"
      }
    }

    # Parse Python log format
    grok {
      match => {
        "message" => "^%{TIMESTAMP_ISO8601:timestamp} - %{WORD:level} - %{DATA:logger}: %{GREEDYDATA:log_message}"
      }
      tag_on_failure => []
    }
  }

  # Process nginx logs
  if [log_type] == "nginx" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status:int} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }

    # Add geoip information for client IP
    if [client_ip] {
      geoip {
        source => "client_ip"
        target => "geoip"
      }
    }
  }

  # Process authentication logs
  if [logger_name] =~ /Security|Auth/ {
    mutate {
      add_tag => [ "security" ]
    }

    # Extract user from authentication logs
    grok {
      match => {
        "message" => "(?<user>[a-zA-Z0-9_]+) (?:authenticated|login|logout)"
      }
      tag_on_failure => []
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => [ "host", "agent", "ecs", "input", "log" ]
  }

  # Create full text search field
  if [message] {
    mutate {
      copy => { "message" => "full_text" }
    }
  }

  # Add processing timestamp
  ruby {
    code => "event.set('processed_at', Time.now.utc.iso8601(3))"
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
    user => "${ELASTICSEARCH_USERNAME:elastic}"
    password => "${ELASTICSEARCH_PASSWORD}"
    
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
    
    # ILM (Index Lifecycle Management)
    ilm_enabled => true
    ilm_rollover_alias => "uav-logs"
    ilm_pattern => "000001"
    ilm_policy => "uav-logs-policy"
    
    # Template settings
    template_name => "uav-logs"
    template_overwrite => true
    
    # Retry configuration
    retry_on_conflict => 3
  }

  # Separate index for errors
  if "error" in [tags] or [level] =~ /ERROR/ {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD}"
      
      index => "uav-logs-error-%{+YYYY.MM.dd}"
      
      # Immediate flush for errors
      flush_size => 1
    }
  }

  # Separate index for performance metrics
  if [metric_type] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:elasticsearch:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD}"
      
      index => "uav-metrics-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (disable in production)
  if "${DEBUG_OUTPUT:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}
