version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uav-zookeeper-stream
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uav-kafka-stream
    depends_on: [zookeeper]
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      resources:
        limits: { memory: 1G }

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: uav-kafka-ui
    depends_on: [kafka]
    ports: ["8087:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: uav-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  flink-jobmanager:
    image: flink:1.18.0
    container_name: uav-flink-jobmanager
    ports: ["8085:8081"]
    command: jobmanager
    environment:
      JOB_MANAGER_MEMORY: 1024m
    deploy:
      resources:
        limits: { memory: 1G }

  flink-taskmanager:
    image: flink:1.18.0
    container_name: uav-flink-taskmanager
    depends_on: [flink-jobmanager]
    command: taskmanager
    environment:
      TASK_MANAGER_MEMORY: 1024m
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
    deploy:
      resources:
        limits: { memory: 1G }
