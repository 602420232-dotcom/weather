# ================================================================
# Docker Compose for Docker Hub Images (Team Usage)
# ================================================================
# 说明：此配置文件用于从 Docker Hub (dithiothreitollf 账户) 
#      直接拉取已构建的镜像，无需本地构建，适合团队成员使用
#
# 用法：
#   docker-compose -f docker-compose.dockerhub.yml up -d
#
# 或者重命名为 docker-compose.yml 后正常使用：
#   docker-compose up -d
# ================================================================

networks:
  uav-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  # ─── Infrastructure ────────────────────────────────────────────
  
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: uav_platform
      MYSQL_USER: uav
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./uav-path-planning-system/database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  redis:
    image: redis:6.2
    container_name: uav-redis
    command: redis-server --databases 16 --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "0", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - uav-net

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - uav-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uav-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - uav-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uav-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - uav-net

  # ─── Core Services (Docker Hub Images) ──────────────────────────

  api-gateway:
    image: dithiothreitollf/api-gateway:latest
    container_name: uav-gateway
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - LOG_PATH=/logs
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - NACOS_SERVER=nacos:8848
      - REDIS_HOST=redis
      - UAV_JWT_SECRET=${JWT_SECRET}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  wrf-processor:
    image: dithiothreitollf/wrf-processor:latest
    container_name: wrf-processor
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wrf_processor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  data-assimilation:
    image: dithiothreitollf/data-assimilation:latest
    container_name: data-assimilation
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/data_assimilation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  meteor-forecast:
    image: dithiothreitollf/meteor-forecast:latest
    container_name: meteor-forecast
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meteor_forecast?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  path-planning:
    image: dithiothreitollf/path-planning:latest
    container_name: path-planning
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/path_planning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-platform:
    image: dithiothreitollf/uav-platform:latest
    container_name: uav-platform
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      wrf-processor:
        condition: service_started
      data-assimilation:
        condition: service_started
      meteor-forecast:
        condition: service_started
      path-planning:
        condition: service_started
    environment:
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD}
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      NACOS_SERVER: nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://wrf-processor:8081/api/wrf
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SERVICES_DATA_ASSIMILATION_URL: http://data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://path-planning:8083/api/planning
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-weather-collector:
    image: dithiothreitollf/weather-collector:latest
    container_name: uav-weather
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_weather?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  edge-cloud-coordinator:
    image: dithiothreitollf/edge-cloud:latest
    container_name: uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  fengwu-service:
    image: dithiothreitollf/fengwu:latest
    container_name: uav-fengwu
    ports:
      - "8085:8085"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      FENGWU_USE_GPU: "false"
      FENGWU_MODEL_PATH: /app/model/fengwu_v2.onnx
      FENGWU_NUM_THREADS: 4
      NACOS_SERVER: nacos:8848
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 150s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - uav-net

  model-engine:
    image: dithiothreitollf/model-engine:latest
    container_name: uav-model-engine
    ports:
      - "8087:8087"
    depends_on:
      nacos:
        condition: service_healthy
      fengwu-service:
        condition: service_started
    environment:
      LOG_PATH: /logs
      MODEL_PYTHON_PATH: /app/python
      NACOS_SERVER: nacos:8848
      FENGWU_SERVICE_URL: http://fengwu-service:8085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - uav-net

  frontend:
    image: dithiothreitollf/frontend:latest
    container_name: uav-frontend
    ports:
      - "3000:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - uav-net

volumes:
  mysql-data:
  redis-data:
  model-engine-data:
