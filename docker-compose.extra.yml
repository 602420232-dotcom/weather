version: '3.8'

networks:
  uav-net:
    driver: bridge

services:
  fenglei-service:
    image: dithiothreitollf/fenglei-service:latest
    container_name: fenglei-service
    ports:
      - "8091:8091"
    environment:
      - LOG_PATH=/logs
      - FENGLEI_ENV=production
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
      - FENGLEI_API_KEY=${FENGLEI_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  tianzi-service:
    image: dithiothreitollf/tianzi-service:latest
    container_name: tianzi-service
    ports:
      - "8090:8090"
    environment:
      - LOG_PATH=/logs
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net
