version: '3.8'

# Docker Compose - 优化版
# 包含差异化资源限制和JVM参数优化

# 引入统一的 JVM 参数配置
x-jvm-env: &jvm-env
  env_file:
    - docker-compose.jvm.env

services:
  # ===== 基础设施层 =====
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-${DB_PASSWORD}}
      MYSQL_DATABASE: uav_platform
      MYSQL_USER: uav
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./uav-path-planning-system/database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
      - --innodb_log_file_size=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  redis:
    image: redis:6.2-alpine
    container_name: uav-redis
    command: redis-server --databases 16 --save 900 1 --save 300 10 --save 60 10000 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "0", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
      - JVM_XMN=128m
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # ===== 微服务层 =====

  # API Gateway - 高并发入口
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.runtime
    container_name: uav-gateway
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
    <<: *jvm-env
    environment:
      - NACOS_SERVER=nacos:8848
      - REDIS_HOST=redis
      # 使用统一的小配置方案
      - JAVA_OPTS=${JAVA_OPTS_SMALL}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # WRF Processor - 气象数据处理 (CPU密集型)
  wrf-processor:
    build:
      context: ./wrf-processor-service
      dockerfile: Dockerfile.runtime
    container_name: wrf-processor
    ports:
      - "8081:8081"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    <<: *jvm-env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wrf_processor?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 60000
      JAVA_OPTS: ${JAVA_OPTS_MEDIUM}
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Data Assimilation - 数据同化服务 (计算密集型)
  data-assimilation:
    build:
      context: ./data-assimilation-service
      dockerfile: Dockerfile.runtime
    container_name: data-assimilation
    ports:
      - "8084:8084"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/data_assimilation?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 300000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -Djava.security.egd=file:/dev/./urandom
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Meteor Forecast - 气象预测服务 (内存密集型)
  meteor-forecast:
    build:
      context: ./meteor-forecast-service
      dockerfile: Dockerfile.runtime
    container_name: meteor-forecast
    ports:
      - "8082:8082"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meteor_forecast?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 120000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Path Planning - 路径规划服务 (实时性要求高)
  path-planning:
    build:
      context: ./path-planning-service
      dockerfile: Dockerfile.runtime
    container_name: path-planning
    ports:
      - "8083:8083"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/path_planning?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 60000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication -XX:+ParallelRefProcEnabled
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # UAV Platform - 主平台服务 (综合型)
  uav-platform:
    build:
      context: ./uav-platform-service
      dockerfile: Dockerfile.runtime
    container_name: uav-platform
    ports:
      - "8080:8080"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
      wrf-processor: { condition: service_started }
      data-assimilation: { condition: service_started }
      meteor-forecast: { condition: service_started }
      path-planning: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_platform?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      NACOS_SERVER: nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://wrf-processor:8081/api/wrf
      SERVICES_DATA_ASSIMILATION_URL: http://data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://path-planning:8083/api/planning
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # UAV Weather Collector - 气象采集服务 (IO密集型)
  uav-weather-collector:
    build:
      context: ./uav-weather-collector
      dockerfile: Dockerfile.runtime
    container_name: uav-weather
    ports:
      - "8086:8086"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_weather?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      JWT_SECRET: ${JWT_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD:-changeme}
      DB_PASSWORD: ${DB_PASSWORD}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Edge Cloud Coordinator - 边云协同服务
  edge-cloud-coordinator:
    build: ./edge-cloud-coordinator
    container_name: uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    depends_on:
      kafka: { condition: service_started }
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # FengWu - 天 气大模型推理服务 (CPU/GPU)
  fengwu:
    build:
      context: ./fengwu-service
      dockerfile: Dockerfile
    container_name: uav-fengwu
    ports:
      - "8085:8085"
    volumes:
      - /mnt/d/Developer/FengWu_All/FengWu:/app/model:ro
    environment:
      FENGWU_MODEL_PATH: /app/model/fengwu_v2.onnx
      FENGWU_MEAN_PATH: /app/model/data_mean.npy
      FENGWU_STD_PATH: /app/model/data_std.npy
      FENGWU_USE_GPU: "false"
      FENGWU_THREADS: "4"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Vue3 Frontend - 前端 Web 应用
  frontend:
    build:
      context: ./uav-path-planning-system/frontend-vue
      dockerfile: Dockerfile
    container_name: uav-frontend
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - uav-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uav-kafka
    depends_on:
      zookeeper: { condition: service_started }
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST:-localhost}:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9999
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M
    networks:
      - uav-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uav-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - uav-network

volumes:
  mysql-data:
  redis-data:

networks:
  uav-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-uav
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
