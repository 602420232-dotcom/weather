networks:
  uav-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: uav_platform
      MYSQL_USER: uav
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./uav-path-planning-system/database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  redis:
    image: redis:7.2
    container_name: uav-redis
    command: redis-server --databases 16 --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "0", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - uav-net

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - uav-net

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/api-gateway:latest
    container_name: uav-gateway
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - LOG_PATH=/logs
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - NACOS_SERVER=nacos:8848
      - SPRING_DATA_REDIS_HOST=redis
      - UAV_JWT_SECRET=${JWT_SECRET}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  wrf-processor:
    build:
      context: .
      dockerfile: ./wrf-processor-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/wrf-processor:latest
    container_name: wrf-processor
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wrf_processor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - uav-net

  data-assimilation:
    build:
      context: .
      dockerfile: ./data-assimilation-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/data-assimilation:latest
    container_name: data-assimilation
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_REDIS_HOST: redis
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/data_assimilation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  meteor-forecast:
    build:
      context: .
      dockerfile: ./meteor-forecast-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/meteor-forecast:latest
    container_name: meteor-forecast
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATA_REDIS_HOST: redis
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meteor_forecast?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  path-planning:
    build:
      context: .
      dockerfile: ./path-planning-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/path-planning:latest
    container_name: path-planning
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/path_planning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-platform:
    build:
      context: .
      dockerfile: ./uav-platform-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/uav-platform:latest
    container_name: uav-platform
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      wrf-processor:
        condition: service_started
      data-assimilation:
        condition: service_started
      meteor-forecast:
        condition: service_started
      path-planning:
        condition: service_started
    environment:
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD}
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      NACOS_SERVER: nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://wrf-processor:8081/api/wrf
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SERVICES_DATA_ASSIMILATION_URL: http://data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://path-planning:8083/api/planning
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-weather-collector:
    build:
      context: .
      dockerfile: ./uav-weather-collector/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/weather-collector:latest
    container_name: uav-weather
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_weather?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx384m"
      CMA_API_KEY: ${CMA_API_KEY:-}
      OWM_API_KEY: ${OWM_API_KEY:-}
      ECMWF_API_KEY: ${ECMWF_API_KEY:-}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    networks:
      - uav-net

  edge-cloud-coordinator:
    build: ./edge-cloud-coordinator
    image: ghcr.io/602420232-dotcom/weather/edge-cloud:latest
    container_name: uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  fengwu-service:
    build:
      context: ./fengwu-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/fengwu:latest
    container_name: uav-fengwu
    entrypoint: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8085"]
    ports:
      - "8085:8085"
    depends_on:
      nacos:
        condition: service_healthy
    volumes:
      - ${FENGWU_MODEL_DIR:-./models/fengwu}:/app/model:ro
    environment:
      LOG_PATH: /logs
      FENGWU_USE_GPU: "false"
      FENGWU_MODEL_PATH: /app/model/fengwu_v2.onnx
      FENGWU_MEAN_PATH: /app/model/data_mean.npy
      FENGWU_STD_PATH: /app/model/data_std.npy
      FENGWU_NUM_THREADS: 4
      NACOS_SERVER: nacos:8848
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - uav-net

  model-engine:
    build:
      context: ./model-engine
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/model-engine:latest
    container_name: uav-model-engine
    ports:
      - "8087:8087"
    depends_on:
      nacos:
        condition: service_healthy
      fengwu-service:
        condition: service_started
      tianzi-service:
        condition: service_started
      fenglei-service:
        condition: service_started
    environment:
      LOG_PATH: /logs
      MODEL_PYTHON_PATH: /app/python
      NACOS_SERVER: nacos:8848
      FENGWU_SERVICE_URL: http://fengwu-service:8085
      TIANZI_SERVICE_URL: http://tianzi-service:8090
      FENGLEI_SERVICE_URL: http://fenglei-service:8091
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - uav-net

  tianzi-service:
    build:
      context: ./tianzi-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/tianzi:latest
    container_name: uav-tianzi
    ports:
      - "8090:8090"
    environment:
      TIANZI_API_KEY: ${TIANZI_API_KEY:-dev-key-not-for-production}
      TIANZI_MODEL_PATH: /app/model/tianzi.onnx
      TIANZI_ENV: ${TIANZI_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - ${TIANZI_MODEL_DIR:-./models/tianzi}:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - uav-net

  fenglei-service:
    build:
      context: ./fenglei-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/fenglei:latest
    container_name: uav-fenglei
    ports:
      - "8091:8091"
    environment:
      FENGLEI_API_KEY: ${FENGLEI_API_KEY:-dev-key-not-for-production}
      FENGLEI_CACHE_DIR: /app/cache
      FENGLEI_UPDATE_INTERVAL: ${FENGLEI_UPDATE_INTERVAL:-30}
      FENGLEI_ENV: ${FENGLEI_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    volumes:
      - fenglei-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - uav-net

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: uav-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - uav-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: uav-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - uav-net

  frontend:
    build:
      context: ./uav-path-planning-system/frontend-vue
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/frontend:latest
    container_name: uav-frontend
    ports:
      - "3000:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - uav-net

volumes:
  mysql-data:
  redis-data:
  model-engine-data:
  fenglei-cache:
