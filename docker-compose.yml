services:
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-CHANGE_ME}
      MYSQL_DATABASE: uav_platform
      MYSQL_USER: uav
      MYSQL_PASSWORD: ${DB_PASSWORD:-CHANGE_ME}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./uav-path-planning-system/database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:6.2
    container_name: uav-redis
    command: redis-server --databases 16 --save 900 1 --save 300 10 --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "0", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/api-gateway:latest
    container_name: uav-gateway
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - LOG_PATH=/logs
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - NACOS_SERVER=nacos:8848
      - REDIS_HOST=redis
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  wrf-processor:
    build:
      context: .
      dockerfile: ./wrf-processor-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/wrf-processor:latest
    container_name: wrf-processor
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wrf_processor?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  data-assimilation:
    build:
      context: .
      dockerfile: ./data-assimilation-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/data-assimilation:latest
    container_name: data-assimilation
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/data_assimilation?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  meteor-forecast:
    build:
      context: .
      dockerfile: ./meteor-forecast-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/meteor-forecast:latest
    container_name: meteor-forecast
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meteor_forecast?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  path-planning:
    build:
      context: .
      dockerfile: ./path-planning-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/path-planning:latest
    container_name: path-planning
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/path_planning?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  uav-platform:
    build:
      context: .
      dockerfile: ./uav-platform-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/uav-platform:latest
    container_name: uav-platform
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      wrf-processor:
        condition: service_started
      data-assimilation:
        condition: service_started
      meteor-forecast:
        condition: service_started
      path-planning:
        condition: service_started
    environment:
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD}
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_platform?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      NACOS_SERVER: nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://wrf-processor:8081/api/wrf
      SERVICES_DATA_ASSIMILATION_URL: http://data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://path-planning:8083/api/planning
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  uav-weather-collector:
    build:
      context: .
      dockerfile: ./uav-weather-collector/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/weather-collector:latest
    container_name: uav-weather
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_weather?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  edge-cloud-coordinator:
    build: ./edge-cloud-coordinator
    image: ghcr.io/602420232-dotcom/weather/edge-cloud:latest
    container_name: uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  fengwu-service:
    build:
      context: .
      dockerfile: ./fengwu-service/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/fengwu:latest
    container_name: uav-fengwu
    ports:
      - "8085:8085"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      LOG_PATH: /logs
      FENGWU_USE_GPU: "false"
      FENGWU_MODEL_PATH: /app/model/fengwu_v2.onnx
      FENGWU_NUM_THREADS: 4
      NACOS_SERVER: nacos:8848
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  model-engine:
    build:
      context: .
      dockerfile: ./model-engine/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/model-engine:latest
    container_name: uav-model-engine
    ports:
      - "8087:8087"
    depends_on:
      nacos:
        condition: service_healthy
      fengwu-service:
        condition: service_started
    environment:
      LOG_PATH: /logs
      MODEL_PYTHON_PATH: /app/python
      NACOS_SERVER: nacos:8848
      FENGWU_SERVICE_URL: http://fengwu-service:8085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uav-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    deploy:
      resources:
        limits:
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uav-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: ./uav-path-planning-system/frontend-vue
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/frontend:latest
    container_name: uav-frontend
    ports:
      - "3000:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  mysql-data:
  redis-data:
  model-engine-data:

networks:
  trae_default:
    # 生产环境使用 external: true 预先创建网络
    # docker network create trae_default
    driver: bridge
