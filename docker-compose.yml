# Docker Compose - 优化版
# 包含差异化资源限制和JVM参数优化

services:
  # ===== 基础设施层 =====
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: uav_platform
      MYSQL_USER: uav
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./uav-path-planning-system/database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
      - --innodb_log_file_size=64M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  redis:
    image: redis:6.2-alpine
    container_name: uav-redis
    command: redis-server --databases 16 --save 900 1 --save 300 10 --save 60 10000 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-n", "0", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
      - JVM_XMS=256m
      - JVM_XMX=512m
      - JVM_XMN=128m
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # ===== 微服务层 =====

  # API Gateway - 高并发入口
  api-gateway:
    build: ./api-gateway
    container_name: uav-gateway
    ports:
      - "8088:8088"
    depends_on:
      nacos:
        condition: service_healthy
    environment:
      - NACOS_SERVER=nacos:8848
      - REDIS_HOST=redis
      # JVM优化参数
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 384M
          cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # WRF Processor - 气象数据处理 (CPU密集型)
  wrf-processor:
    build: ./wrf-processor-service
    container_name: wrf-processor
    ports:
      - "8081:8081"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/wrf_processor?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 60000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:+ParallelRefProcEnabled
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2.0'
        reservations:
          memory: 768M
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Data Assimilation - 数据同化服务 (计算密集型)
  data-assimilation:
    build: ./data-assimilation-service
    container_name: data-assimilation
    ports:
      - "8084:8084"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/data_assimilation?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 300000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -Djava.security.egd=file:/dev/./urandom
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Meteor Forecast - 气象预测服务 (内存密集型)
  meteor-forecast:
    build: ./meteor-forecast-service
    container_name: meteor-forecast
    ports:
      - "8082:8082"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meteor_forecast?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 120000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 768M
          cpus: '0.75'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Path Planning - 路径规划服务 (实时性要求高)
  path-planning:
    build: ./path-planning-service
    container_name: path-planning
    ports:
      - "8083:8083"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/path_planning?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      NACOS_SERVER: nacos:8848
      PYTHON_TIMEOUT: 60000
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:+UseStringDeduplication -XX:+ParallelRefProcEnabled
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 768M
          cpus: '0.75'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # UAV Platform - 主平台服务 (综合型)
  uav-platform:
    build: ./uav-platform-service
    container_name: uav-platform
    ports:
      - "8080:8080"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      nacos: { condition: service_healthy }
      wrf-processor: { condition: service_started }
      data-assimilation: { condition: service_started }
      meteor-forecast: { condition: service_started }
      path-planning: { condition: service_started }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_platform?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      NACOS_SERVER: nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://wrf-processor:8081/api/wrf
      SERVICES_DATA_ASSIMILATION_URL: http://data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://path-planning:8083/api/planning
      JAVA_OPTS: -Xms512m -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 768M
          cpus: '0.75'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # UAV Weather Collector - 气象采集服务 (IO密集型)
  uav-weather-collector:
    build: ./uav-weather-collector
    container_name: uav-weather
    ports:
      - "8086:8086"
    depends_on:
      mysql: { condition: service_healthy }
      nacos: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_weather?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      NACOS_SERVER: nacos:8848
      JAVA_OPTS: -Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
        reservations:
          memory: 384M
          cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  # Edge Cloud Coordinator - 边云协同服务
  edge-cloud-coordinator:
    build: ./edge-cloud-coordinator
    container_name: uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    depends_on:
      kafka: { condition: service_started }
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    security_opt:
      - no-new-privileges:true
    networks:
      - uav-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: uav-kafka
    depends_on:
      zookeeper: { condition: service_started }
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_JMX_PORT: 9999
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
        reservations:
          memory: 768M
          cpus: '0.5'
    networks:
      - uav-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: uav-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    networks:
      - uav-network

volumes:
  mysql-data:
  redis-data:

networks:
  uav-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-uav
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
