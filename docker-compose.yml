version: '3.8'

networks:
  uav-net:
    name: uav-platform-v2_uav-net
    external: true

services:
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/api-gateway:latest
    container_name: trae-uav-gateway
    ports:
      - "8088:8088"
    environment:
      - LOG_PATH=/logs
      - SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING=true
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - NACOS_SERVER=uav-nacos:8848
      - SPRING_DATA_REDIS_HOST=uav-redis
      - UAV_JWT_SECRET=${JWT_SECRET}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  wrf-processor:
    build:
      context: .
      dockerfile: ./services/wrf-processor/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/wrf-processor:latest
    container_name: trae-wrf-processor
    ports:
      - "8081:8081"
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_DATA_REDIS_HOST: uav-redis
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/wrf_processor?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      NACOS_SERVER: uav-nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx384m"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    networks:
      - uav-net

  data-assimilation:
    build:
      context: .
      dockerfile: ./services/data-assimilation/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/data-assimilation:latest
    container_name: trae-data-assimilation
    ports:
      - "8084:8084"
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      SPRING_DATA_REDIS_HOST: uav-redis
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/data_assimilation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      NACOS_SERVER: uav-nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  meteor-forecast:
    build:
      context: .
      dockerfile: ./services/meteor-forecast/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/meteor-forecast:latest
    container_name: trae-meteor-forecast
    ports:
      - "8082:8082"
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATA_REDIS_HOST: uav-redis
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/meteor_forecast?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      NACOS_SERVER: uav-nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  path-planning:
    build:
      context: .
      dockerfile: ./services/path-planning/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/path-planning:latest
    container_name: trae-path-planning
    ports:
      - "8083:8083"
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATA_REDIS_HOST: uav-redis
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/path_planning?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      NACOS_SERVER: uav-nacos:8848
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-platform:
    build:
      context: .
      dockerfile: ./services/uav-platform/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/uav-platform:latest
    container_name: trae-uav-platform
    ports:
      - "8080:8080"
    environment:
      SECURITY_USER_PASSWORD: ${SECURITY_USER_PASSWORD}
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/uav_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      SPRING_DATA_REDIS_HOST: uav-redis
      SPRING_DATA_REDIS_PORT: 6379
      NACOS_SERVER: uav-nacos:8848
      SERVICES_WRF_PROCESSOR_URL: http://trae-wrf-processor:8081/api/wrf
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SERVICES_DATA_ASSIMILATION_URL: http://trae-data-assimilation:8084/api/assimilation
      SERVICES_METEOR_FORECAST_URL: http://trae-meteor-forecast:8082/api/forecast
      SERVICES_PATH_PLANNING_URL: http://trae-path-planning:8083/api/planning
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  uav-weather-collector:
    build:
      context: .
      dockerfile: ./services/weather-collector/Dockerfile
    image: ghcr.io/602420232-dotcom/weather/weather-collector:latest
    container_name: trae-uav-weather
    ports:
      - "8086:8086"
    environment:
      LOG_PATH: /logs
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"
      SPRING_DATASOURCE_URL: jdbc:mysql://uav-mysql:3306/uav_weather?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-rootpass}
      UAV_JWT_SECRET: ${JWT_SECRET}
      UAV_SECURITY_ACTUATOR_PUBLIC: "true"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: uav-redis
      NACOS_SERVER: uav-nacos:8848
      JAVA_TOOL_OPTIONS: "-Xmx384m"
      CMA_API_KEY: ${CMA_API_KEY:-}
      OWM_API_KEY: ${OWM_API_KEY:-}
      ECMWF_API_KEY: ${ECMWF_API_KEY:-}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    networks:
      - uav-net

  edge-cloud-coordinator:
    build: ./services/edge-cloud-coordinator
    image: ghcr.io/602420232-dotcom/weather/edge-cloud-coordinator:latest
    container_name: trae-uav-edge-cloud
    ports:
      - "8000:8000"
      - "8765:8765"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: uav-kafka:9092
      REDIS_HOST: uav-redis
      REDIS_PORT: 6379
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - uav-net

  fengwu-service:
    build:
      context: ./services/fengwu-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/fengwu-service:latest
    container_name: trae-uav-fengwu
    entrypoint: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8085"]
    ports:
      - "8085:8085"
    volumes:
      - ${FENGWU_MODEL_DIR:-./models/fengwu}:/app/model:ro
    environment:
      LOG_PATH: /logs
      FENGWU_USE_GPU: "false"
      FENGWU_MODEL_PATH: /app/model/fengwu_v2.onnx
      FENGWU_MEAN_PATH: /app/model/data_mean.npy
      FENGWU_STD_PATH: /app/model/data_std.npy
      FENGWU_NUM_THREADS: 4
      NACOS_SERVER: uav-nacos:8848
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - uav-net

  model-engine:
    build:
      context: ./services/model-engine
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/model-engine:latest
    container_name: trae-uav-model-engine
    ports:
      - "8087:8087"
    environment:
      LOG_PATH: /logs
      MODEL_PYTHON_PATH: /app/python
      NACOS_SERVER: uav-nacos:8848
      FENGWU_SERVICE_URL: http://trae-uav-fengwu:8085
      TIANZI_SERVICE_URL: http://uav-algorithm-engine:9090
      FENGLEI_SERVICE_URL: http://trae-uav-fenglei:8091
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8087/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    networks:
      - uav-net

  tianzi-service:
    build:
      context: ./services/tianzi-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/tianzi-service:latest
    container_name: trae-uav-tianzi
    ports:
      - "8090:8090"
    environment:
      TIANZI_API_KEY: ${TIANZI_API_KEY:-dev-key-not-for-production}
      TIANZI_MODEL_PATH: /app/model/tianzi.onnx
      TIANZI_ENV: ${TIANZI_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - ${TIANZI_MODEL_DIR:-./models/tianzi}:/app/model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - uav-net

  fenglei-service:
    build:
      context: ./services/fenglei-service
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/fenglei-service:latest
    container_name: trae-uav-fenglei
    ports:
      - "8091:8091"
    environment:
      FENGLEI_API_KEY: ${FENGLEI_API_KEY:-dev-key-not-for-production}
      FENGLEI_CACHE_DIR: /app/cache
      FENGLEI_UPDATE_INTERVAL: ${FENGLEI_UPDATE_INTERVAL:-30}
      FENGLEI_ENV: ${FENGLEI_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    volumes:
      - fenglei-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - uav-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/602420232-dotcom/weather/frontend:latest
    container_name: trae-uav-frontend
    ports:
      - "3000:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - uav-net

volumes:
  fenglei-cache:
