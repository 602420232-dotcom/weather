filebeat.inputs:
- type: container
  paths:
    - /var/lib/docker/containers/*/*.log
  json.keys_under_root: true
  json.add_error_key: true
  json.overwrite_keys: true
  processors:
    - add_docker_metadata:
        host: "unix:///var/run/docker.sock"
    - decode_json_fields:
        fields: ["message"]
        target: "json"
        overwrite_keys: true
    - drop_fields:
        fields: ["ecs", "agent.hostname"]

output.logstash:
  hosts: ["logstash:5044"]

logging.level: warning
