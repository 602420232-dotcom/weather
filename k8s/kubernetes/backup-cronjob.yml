apiVersion: batch/v1
kind: CronJob
metadata:
  name: uav-database-backup
  namespace: uav-path-planning
  labels:
    app: uav-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: mysql-backup
            image: mysql:8.0
            command:
            - /bin/sh
            - -c
            - |
              # Full database backup
              mkdir -p /backup/$(date +%Y%m%d)
              
              for db in uav_platform wrf_processor meteor_forecast path_planning data_assimilation uav_weather; do
                echo "Backing up $db..."
                mysqldump -h mysql -u root -p${DB_PASSWORD} \
                  --single-transaction \
                  --routines \
                  --triggers \
                  --events \
                  --databases $db \
                  --result-file=/backup/$(date +%Y%m%d)/${db}.sql
                gzip /backup/$(date +%Y%m%d)/${db}.sql
              done
              
              # Cleanup backups older than 30 days
              find /backup -type d -mtime +30 -exec rm -rf {} \; 2>/dev/null || true
              
              echo "Backup completed: $(date)"
            env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-secrets
                  key: db-password
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc
          restartPolicy: OnFailure
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: uav-path-planning
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: uav-path-planning
data:
  verify-backup.sh: |
    #!/bin/bash
    # Verify backup integrity
    BACKUP_DIR=${1:-/backup}
    for f in $(find $BACKUP_DIR -name "*.sql.gz" -type f); do
      echo "Verifying: $f"
      gunzip -t "$f" && echo "  OK" || echo "  FAILED"
    done
