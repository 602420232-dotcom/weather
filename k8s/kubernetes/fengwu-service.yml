apiVersion: apps/v1
kind: Deployment
metadata:
  name: fengwu-service
  namespace: uav-platform
  labels:
    app: fengwu-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fengwu-service
  template:
    metadata:
      labels:
        app: fengwu-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: fengwu
          image: trae-fengwu:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: uav-platform-config
          ports:
            - containerPort: 8085
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2"
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 120
            periodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: fengwu-service
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: fengwu-service
  ports:
    - port: 8085
      targetPort: 8085
