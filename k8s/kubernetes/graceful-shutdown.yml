apiVersion: v1
kind: ConfigMap
metadata:
  name: graceful-shutdown-config
  namespace: uav-path-planning
data:
  application-graceful.yml: |
    # Graceful Shutdown Configuration
    server:
      shutdown: graceful
    
    spring:
      lifecycle:
        timeout-per-shutdown-phase: 30s
    
    # Health check needs to know about graceful shutdown
    management:
      endpoint:
        health:
          probes:
            enabled: true
      health:
        readinessstate:
          enabled: true
        livenessstate:
          enabled: true
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus,shutdown
      endpoint:
        shutdown:
          enabled: true
    
    # HikariCP connection pool cleanup
    spring.datasource.hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
