apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uav-platform-ingress
  namespace: uav-path-planning
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=(self)";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - uav-platform.example.com
    secretName: uav-platform-tls
  rules:
  - host: uav-platform.local
    http:
      paths:
      - path: /api/platform
        pathType: Prefix
        backend:
          service:
            name: uav-platform
            port:
              number: 8080
      - path: /api/forecast
        pathType: Prefix
        backend:
          service:
            name: meteor-forecast
            port:
              number: 8082
      - path: /api/planning
        pathType: Prefix
        backend:
          service:
            name: path-planning
            port:
              number: 8083
      - path: /api/wrf
        pathType: Prefix
        backend:
          service:
            name: wrf-processor
            port:
              number: 8081
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-vue
            port:
              number: 80