apiVersion: v1
kind: Secret
metadata:
  name: uav-secrets
  namespace: uav-path-planning
type: Opaque
stringData:
  # Database (MUST change in production)
  db-password: "CHANGE_ME_STRONG_PASSWORD_32CHARS_MIN"
  db-root-password: "CHANGE_ME_ROOT_PASSWORD_32CHARS_MIN"
  
  # Redis
  redis-password: "CHANGE_ME_REDIS_PASSWORD"
  
  # JWT
  jwt-secret: "uav-platform-jwt-secret-must-be-256-bits-long-for-hs512"
  jwt-expiration: "86400000"
  
  # Encryption
  encryption-key: "uav-platform-encryption-key-must-be-256-bits-long!!"
  
  # External Services
  nvd-api-key: ""
  sentry-dsn: ""
  
  # Monitoring
  grafana-admin-password: "CHANGE_ME_GRAFANA_PASSWORD"
  
  # Nacos
  nacos-mysql-password: "CHANGE_ME_NACOS_PASSWORD"
