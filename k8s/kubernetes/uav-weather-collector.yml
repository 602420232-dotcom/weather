apiVersion: apps/v1
kind: Deployment
metadata:
  name: uav-weather-collector
  namespace: uav-platform
  labels:
    app: uav-weather-collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uav-weather-collector
  template:
    metadata:
      labels:
        app: uav-weather-collector
    spec:
      containers:
        - name: weather-collector
          image: uav-registry/uav-weather-collector:v1.0.0
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: NACOS_SERVER
              value: nacos:8848
            - name: DB_HOST
              value: mysql
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: uav-secrets
                  key: db-password
            - name: REDIS_HOST
              value: redis
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8086 }
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 200m }
---
apiVersion: v1
kind: Service
metadata:
  name: uav-weather-collector
  namespace: uav-platform
spec:
  type: ClusterIP
  selector:
    app: uav-weather-collector
  ports:
    - name: http
      port: 8086
      targetPort: 8086
