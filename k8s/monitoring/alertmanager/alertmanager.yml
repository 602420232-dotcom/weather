global:
  resolve_timeout: 5m
  slack_api_url: ''
  pagerduty_url: ''

route:
  receiver: 'default-receiver'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  group_by: ['alertname', 'severity']
  
  routes:
  - match:
      severity: critical
    receiver: 'critical-receiver'
    repeat_interval: 1h
    group_wait: 10s
  
  - match:
      severity: warning
    receiver: 'warning-receiver'
    repeat_interval: 4h
  
  - match:
      component: infrastructure
    receiver: 'infra-receiver'
    group_by: ['alertname', 'component']

receivers:
- name: 'default-receiver'
  webhook_configs:
  - url: 'http://alert-webhook:8080/webhook'
    send_resolved: true

- name: 'critical-receiver'
  webhook_configs:
  - url: 'http://alert-webhook:8080/webhook/critical'
    send_resolved: true
  pagerduty_configs:
  - routing_key: ''
    severity: critical

- name: 'warning-receiver'
  webhook_configs:
  - url: 'http://alert-webhook:8080/webhook/warning'
    send_resolved: true
  slack_configs:
  - channel: '#uav-alerts'
    title: '{{ .GroupLabels.alertname }}'
    text: '{{ .CommonAnnotations.description }}'

- name: 'infra-receiver'
  email_configs:
  - to: 'ops@example.com'
    from: 'alertmanager@uav-platform.com'
    smarthost: 'smtp.example.com:587'
    auth_username: ''
    auth_password: ''
  
inhibit_rules:
- source_match:
    severity: critical
  target_match:
    severity: warning
  equal: ['alertname', 'job']
