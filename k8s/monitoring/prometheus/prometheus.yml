# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'uav-platform'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # Spring Boot applications
  - job_name: 'uav-platform-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['uav-platform-service:8080']
        labels:
          application: 'uav-platform'
          component: 'backend'

  - job_name: 'data-assimilation-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['data-assimilation-service:8081']
        labels:
          application: 'data-assimilation'
          component: 'backend'

  - job_name: 'meteor-forecast-service'
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['meteor-forecast-service:8082']
        labels:
          application: 'meteor-forecast'
          component: 'backend'

  # Python services
  - job_name: 'path-planning-python'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['path-planning-python:8000']
        labels:
          application: 'path-planning'
          component: 'algorithm'

  - job_name: 'data-assimilation-python'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['data-assimilation-python:8001']
        labels:
          application: 'data-assimilation'
          component: 'algorithm'

  # Infrastructure
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          component: 'database'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          component: 'cache'

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          component: 'web-server'

  # Docker containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          component: 'container-monitor'

  # Kubernetes pods (if running in K8s)
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
