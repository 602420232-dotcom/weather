# Prometheus + Grafana + Jaeger 可观测性架构
apiVersion: v1
kind: Namespace
metadata:
  name: uav-observability

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: uav-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          env:
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 9411
              name: zipkin

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: uav-observability
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: zipkin
      port: 9411
      targetPort: 9411

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: uav-observability
data:
  prometheus.yml: |
    global: { scrape_interval: 10s, evaluation_interval: 10s }
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']
    rule_files:
      - /etc/prometheus/alert-rules.yml
    scrape_configs:
      - job_name: 'uav-microservices'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets:
              - 'wrf-processor:8081'
              - 'meteor-forecast:8082'
              - 'path-planning:8083'
              - 'data-assimilation:8084'
              - 'uav-platform:8080'
              - 'api-gateway:8088'
              - 'uav-weather-collector:8086'
      - job_name: 'edge-cloud-coordinator'
        metrics_path: '/metrics'
        static_configs:
          - targets:
              - 'edge-cloud-coordinator:8000'
      - job_name: 'jaeger'
        static_configs:
          - targets: ['jaeger:16686']
      - job_name: 'node-exporter'
        static_configs:
          - targets: ['node-exporter:9100']
    alert_rules:
      groups:
        - name: uav-alerts
          rules:
            - alert: ServiceDown
              expr: up == 0
              for: 1m
              labels: { severity: critical }
              annotations: { summary: "服务 {{ $labels.instance }} 离线" }
            - alert: HighMemoryUsage
              expr: jvm_memory_used_bytes / jvm_memory_max_bytes > 0.85
              for: 2m
              labels: { severity: warning }
              annotations: { summary: "{{ $labels.instance }} 内存超过85%" }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: uav-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-config
          configMap:
            name: grafana-datasources

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: uav-observability
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
      - name: Jaeger
        type: jaeger
        url: http://jaeger:16686
        access: proxy
      - name: Elasticsearch
        type: elasticsearch
        url: http://elasticsearch:9200
        access: proxy
        database: "[uav-logs-]YYYY.MM.DD"
        jsonData:
          esVersion: 8.11.0
          timeField: "@timestamp"
