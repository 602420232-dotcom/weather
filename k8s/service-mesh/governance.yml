apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: uav-platform-mtls
  namespace: uav-path-planning
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: uav-platform-mtls-dr
  namespace: uav-path-planning
spec:
  host: "*.uav-path-planning.svc.cluster.local"
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
# Circuit breaker configuration
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: uav-platform-circuit-breaker
  namespace: uav-path-planning
spec:
  host: "*.uav-path-planning.svc.cluster.local"
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: uav-platform-canary
  namespace: uav-path-planning
spec:
  hosts:
  - uav-platform
  http:
  - route:
    - destination:
        host: uav-platform
        subset: stable
      weight: 90
    - destination:
        host: uav-platform
        subset: canary
      weight: 10
