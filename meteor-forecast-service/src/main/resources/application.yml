spring:
  application:
    name: meteor-forecast-service
  
  # 閺佺増宓佹惔鎾诲帳缂?
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/meteor_forecast?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA闁板秶鐤?
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# 閺堝秴濮熼崳銊╁帳缂?
server:
  port: 8082
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 閸嬨儱鎮嶅Λ鈧弻?
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 妫板嫭绁撮張宥呭闁板秶鐤?
forecast:
  # 濡€崇€风捄顖氱窞
  model-path: ${user.dir}/models
  # Python閼存碍婀扮捄顖氱窞
  python-script: ${user.dir}/src/main/python/meteor_forecast.py
  # 婢跺嫮鎮婄搾鍛閺冨爼妫?
  timeout: 60000
