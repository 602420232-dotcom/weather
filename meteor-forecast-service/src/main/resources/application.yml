spring:
  application:
    name: meteor-forecast-service
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/meteor_forecast?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# 服务器配置
server:
  port: 8082
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 预测服务配置
forecast:
  # 模型路径
  model-path: ${user.dir}/models
  # Python脚本路径
  python-script: ${user.dir}/src/main/python/meteor_forecast.py
  # 处理超时时间
  timeout: 60000
