site_name: UAV 智能路径规划系统
site_description: 气象驱动无人机 VRP 智能路径规划系统
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    primary: indigo

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true

nav:
  - 首页: README.md
  - 项目总览:
    - 文档中心: README.md
    - 快速参考: QUICK_REFERENCE.md
    - 完整构建指南: COMPLETE_BUILD_GUIDE.md
  - 架构与设计:
    - 架构设计: architecture.md
    - 项目结构: PROJECT_STRUCTURE.md
    - 端口配置: PORTS_CONFIGURATION.md
    - API聚合: API_AGGREGATION_CONFIG.md
  - 部署:
    - 部署指南: DEPLOYMENT.md
    - Docker: DOCKER.md
    - 构建示例: EXAMPLE.md
  - API 文档:
    - API 总览: api/API_DOCUMENTATION.md
    - API 索引: api/README.md
    - 边云协同: api/edge-cloud-coordinator/coordinator.md
    - 边云 OpenAPI: api/edge-cloud-coordinator/openapi.yaml
  - 开发:
    - Maven修复: MAVEN_FIX.md
    - Feign迁移: FEIGN_MIGRATION_GUIDE.md
  - 报告:
    - 全量审计报告: reports/FULL_PROJECT_AUDIT_REPORT.md
    - 修复完成报告: reports/FIX_COMPLETION_REPORT.md
    - 分支价值分析: reports/BRANCH_VALUE_ANALYSIS_REPORT.md
