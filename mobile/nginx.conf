server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 安全头配置
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # 内容安全策略 (CSP) — Report-Only 模式，先监控不阻止
    add_header Content-Security-Policy-Report-Only "
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https:;
        connect-src 'self' https://cdn.jsdelivr.net https://unpkg.com;
        frame-ancestors 'self';
        base-uri 'self';
        form-action 'self';
        report-uri /api/csp-violation-report;
        report-to csp-endpoint;
    " always;

    # CSP 报告端点 (Report-To 头，支持 Reporting API)
    add_header Report-To '{"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"/api/csp-violation-report"}]}' always;

    # Flutter SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 代理 API 请求到 API Gateway（保留 /api 前缀）
    location /api/ {
        proxy_pass http://uav-gateway:8088/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 代理到 FengWu 服务
    location /fengwu/ {
        proxy_pass http://uav-fengwu:8085/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Flutter canvaskit 资源缓存
    location /canvaskit/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_disable "MSIE [1-6]\.";
}
