spring:
  application:
    name: path-planning-service
  
  # 閺佺増宓佹惔鎾诲帳缂?
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/path_planning?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA闁板秶鐤?
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# 閺堝秴濮熼崳銊╁帳缂?
server:
  port: 8083
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 閸嬨儱鎮嶅Λ鈧弻?
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 鐠侯垰绶炵憴鍕灊闁板秶鐤?
planning:
  # Python閼存碍婀扮捄顖氱窞
  python-script: ${user.dir}/src/main/python/three_layer_planner.py
  # 婢跺嫮鎮婄搾鍛閺冨爼妫?
  timeout: 60000
  # 缁犳纭堕崣鍌涙殶
  algorithm:
    vrptw:
      max-iterations: 1000
      savings-weight: 0.5
    astar:
      grid-size: 10
      heuristic-weight: 1.0
    dwa:
      max-speed: 5.0
      max-acceleration: 2.0
      obstacle-threshold: 1.0
