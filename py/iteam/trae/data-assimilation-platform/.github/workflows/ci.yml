# .github/workflows/ci.yml
name: CI

on: [push, pull_request]

jobs:
  test-algorithm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          cd algorithm_core
          pip install -e ".[test]"
          pytest tests/ --cov --cov-report=xml
      - uses: codecov/codecov-action@v3

  test-python-service:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
    steps:
      - uses: actions/checkout@v4
      - run: |
          cd service_python
          pip install -r requirement.txt
          pytest tests/

  test-spring-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: |
          cd service_spring
          mvn test

  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint shared/protos
      - run: buf breaking shared/protos --against '.git#branch=main'
