apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-assimilation-python
  namespace: data-assimilation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-assimilation-python
  template:
    metadata:
      labels:
        app: data-assimilation-python
    spec:
      containers:
      - name: data-assimilation-python
        image: data-assimilation-python:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: LOG_LEVEL
          value: "INFO"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: data-assimilation-secrets
              key: redis.password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: data-assimilation-secrets
              key: jwt.secret
        - name: WRF_PROCESSOR_URL
          value: "http://wrf-processor-service:8081"
        - name: METEOR_FORECAST_URL
          value: "http://meteor-forecast-service:8082"
        - name: PATH_PLANNING_URL
          value: "http://path-planning-service:8083"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 15
