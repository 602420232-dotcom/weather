version: '3.8'

services:
  # MySQL数据库服务
  mysql:
    image: mysql:8.0
    container_name: uav-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: uav_path_planning
      MYSQL_USER: uav
      MYSQL_PASSWORD: uav123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/create_tables.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # Redis缓存服务
  redis:
    image: redis:6.2
    container_name: uav-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  # 应用服务
  uav-app:
    build: .
    container_name: uav-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/uav_path_planning?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: uav
      SPRING_DATASOURCE_PASSWORD: uav123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    restart: always

volumes:
  mysql-data:
  redis-data: