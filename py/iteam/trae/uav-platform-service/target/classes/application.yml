spring:
  application:
    name: uav-platform-service
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/uav_platform?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  
  # Spring Security配置
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 服务配置
services:
  # WRF处理服务
  wrf-processor:
    url: http://wrf-processor:8081/api/wrf
  
  # 贝叶斯同化服务（使用现有的data_assimilation_platform）
  data-assimilation:
    url: http://data-assimilation:8084/api/assimilation
  
  # 气象预测服务
  meteor-forecast:
    url: http://meteor-forecast:8082/api/forecast
  
  # 路径规划服务
  path-planning:
    url: http://path-planning:8083/api/planning