spring:
  application:
    name: wrf-processor-service
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/wrf_processor?useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /api

# WRF配置
wrf:
  # 数据路径
  data-path: ${user.dir}/data/wrf
  # Python脚本路径
  python-script: ${user.dir}/src/main/python/wrf_processor.py
  # 处理超时时间
  timeout: 60000