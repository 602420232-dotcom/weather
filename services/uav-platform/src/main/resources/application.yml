spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: uav-platform-service
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://mysql:3306/uav_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  # Spring Security配置
  security:
    user:
      name: admin
      password: ${SECURITY_USER_PASSWORD}  # 移除默认值，强制要求配置
      roles: ADMIN

  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: classpath:health-config.yml

# 服务器配置
server:
  port: 8080
  shutdown: graceful

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

uav:
  jwt:
    secret: ${JWT_SECRET}