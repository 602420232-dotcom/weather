server:
  port: 8086
  shutdown: graceful
  ssl:
    enabled: ${SSL_ENABLED:false}

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: classpath:health-config.yml
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/uav_weather?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:uav}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: info
    "[com.uav.weather]": INFO

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

uav:
  jwt:
    secret: ${JWT_SECRET}

# 天气采集调度配置
weather:
  collection:
    wrf-interval: 1800000      # WRF 数据采集间隔 (30分钟)
    ground-interval: 300000    # 地面站数据采集间隔 (5分钟)
    fusion-interval: 900000    # 多源融合间隔 (15分钟)
    risk-interval: 600000      # 风险评估间隔 (10分钟)
  cma:
    api-key: ${CMA_API_KEY}
    base-url: https://api.weather.cma.cn/api
  owm:
    api-key: ${OWM_API_KEY}
    base-url: https://api.openweathermap.org/data/2.5
  ecmwf:
    api-key: ${ECMWF_API_KEY}
    base-url: https://api.ecmwf.int/v1
