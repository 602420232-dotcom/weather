spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: wrf-processor-service
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/wrf_processor?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: classpath:health-config.yml

# 服务器配置
server:
  port: 8081
  shutdown: graceful

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

uav:
  jwt:
    secret: ${JWT_SECRET}

# WRF处理器配置
wrf:
  python-script: wrf_processor.py
  data-path: ./data
  timeout: 30000
  cache:
    enabled: true
    ttl-seconds: 300
    max-size: 100

# 性能配置 - 线程池
task-execution:
  pool:
    core-size: 4
    max-size: 20
    queue-capacity: 200

# 日志配置
logging:
  level:
    "[com.uav.wrf]": INFO
    "[org.springframework]": WARN