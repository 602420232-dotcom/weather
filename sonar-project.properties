# SonarQube配置文件
# 项目标识
sonar.projectKey=uav-path-planning
sonar.projectName=UAV Path Planning System
sonar.projectVersion=1.0.0

# 源码目录
sonar.sources=.
sonar.java.sources=**/src/main/java
sonar.java.test.sources=**/src/test/java

# 排除文件
sonar.exclusions=**/*Application.java,**/config/**,**/dto/**,**/model/**,**/resources/**,**/scripts/**

# 测试排除
sonar.test.exclusions=**/ApplicationTests.java,**/*IT.java

# JaCoCo覆盖率报告路径
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# 质量门配置
sonar.qualitygate.wait=true

# Java版本
sonar.java.version=17

# 编码
sonar.sourceEncoding=UTF-8

# 分支分析
sonar.branch.name=main

# 增量分析
sonar.incremental.mode=true