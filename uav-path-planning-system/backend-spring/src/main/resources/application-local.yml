spring:
  application:
    name: uav-path-planning

  datasource:
    url: jdbc:mysql://localhost:3306/uav_path_planning?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1GB

  cache:
    type: simple

server:
  port: 8089

uav:
  jwt:
    secret: uav_path_planning_jwt_secret_key_2024
    expiration: 86400000
    enabled: true
  python:
    script-path: ${user.dir}/algorithm-core
    timeout: 30000

  wrf:
    data-path: ${user.dir}/data/wrf
    update-interval: 300

  path-planning:
    max-tasks: 200
    max-drones: 10
    replanning-threshold: 3.0

  grpc:
    host: localhost
    port: 50051

logging:
  level:
    root: info
    '[com.uav]': debug

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.uav.model
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
