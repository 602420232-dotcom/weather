spring:
  application:
    name: uav-path-planning

  # 数据库配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:uav_path_planning}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD:60000}

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1GB

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0

  # 缓存配置
  cache:
    type: redis

# 服务器配置
server:
  port: ${SERVER_PORT:8089}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD}
    key-alias: ${SSL_KEY_ALIAS:}

# JWT配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  enabled: ${JWT_ENABLED:true}

# 自定义配置
uav:
  python:
    script-path: ${user.dir}/algorithm-core
    timeout: 30000

  wrf:
    data-path: ${user.dir}/data/wrf
    update-interval: 300

  path-planning:
    max-tasks: 200
    max-drones: 10
    replanning-threshold: 3.0

  grpc:
    host: ${GRPC_HOST:localhost}
    port: ${GRPC_PORT:50051}

logging:
  level:
    root: info
    '[com.uav]': info

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  'type-aliases-package': com.uav.model
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
