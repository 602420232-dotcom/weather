spring:
  application:
    name: uav-path-planning
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:uav_path_planning}?useSSL=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  # Redis配置
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0

  # 缓存配置
  cache:
    type: redis

# 服务器配置
server:
  port: ${SERVER_PORT:8089}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# JWT配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000} # 24小时

# 自定义配置
uav:
  # Python算法配置
  python:
    script-path: ${user.dir}/algorithm-core
    timeout: 30000
  
  # WRF配置
  wrf:
    data-path: ${user.dir}/data/wrf
    update-interval: 300 # 5分钟
  
  # 路径规划配置
  path-planning:
    max-tasks: 200
    max-drones: 10
    replanning-threshold: 3.0
  
  # gRPC配置
  grpc:
    host: ${GRPC_HOST:localhost}
    port: ${GRPC_PORT:50051}

# 日志配置
logging:
  level:
    root: info
    com.uav: info

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.uav.model
  configuration:
    map-underscore-to-camel-case: true

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized