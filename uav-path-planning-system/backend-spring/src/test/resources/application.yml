spring:
  application:
    name: uav-path-planning

  # Test: use H2 in-memory database
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  # Disable Redis & Kafka for tests (not available in CI)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  cache:
    type: simple

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 1GB

server:
  port: 0
  ssl:
    enabled: false

jwt:
  secret: test-jwt-secret-key-for-ci-testing-only
  expiration: 86400000
  enabled: true

uav:
  python:
    script-path: ${user.dir}
    timeout: 30000
  wrf:
    data-path: ${user.dir}/data/wrf
    update-interval: 300
  path-planning:
    max-tasks: 200
    max-drones: 10
    replanning-threshold: 3.0
  grpc:
    host: localhost
    port: 50051

logging:
  level:
    root: warn
    '[com.uav]': warn

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.uav.model
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
