spring:
  application:
    name: uav-platform-service
  main:
    allow-bean-definition-overriding: true
  
  # 閺佺増宓佹惔鎾诲帳缂?
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/uav_platform?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}  # 缁夊娅庢妯款吇閸婄》绱濆鍝勫煑鐟曚焦鐪伴柊宥囩枂
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA闁板秶鐤?
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  
  # Spring Security闁板秶鐤?
  security:
    user:
      name: ${SECURITY_USER_NAME:admin}
      password: ${SECURITY_USER_PASSWORD}  # 缁夊娅庢妯款吇閸婄》绱濆鍝勫煑鐟曚焦鐪伴柊宥囩枂
      roles: ADMIN

# 閺堝秴濮熼崳銊╁帳缂?
server:
  port: 8080
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 閸嬨儱鎮嶅Λ鈧弻?
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# 閺堝秴濮熼柊宥囩枂
services:
  # WRF婢跺嫮鎮婇張宥呭
  wrf-processor:
    url: http://wrf-processor:8081/api/wrf
  
  # 鐠愭繂褰鹃弬顖氭倱閸栨牗婀囬崝?
  data-assimilation:
    url: http://data-assimilation:8084/api/assimilation
  
  # 濮樻棁钖勬０鍕ゴ閺堝秴濮?
  meteor-forecast:
    url: http://meteor-forecast:8082/api/forecast
  
  # 鐠侯垰绶炵憴鍕灊閺堝秴濮?
  path-planning:
    url: http://path-planning:8083/api/planning
