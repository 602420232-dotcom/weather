services:
  # ============================================================
  # 基础设施
  # ============================================================
  nacos:
    image: nacos/nacos-server:v3.2.0
    container_name: uav-nacos
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos
      - MYSQL_SERVICE_USER=nacos
      - MYSQL_SERVICE_PASSWORD=nacos
      - NACOS_AUTH_TOKEN=SGVsbG9OYWNvcw==
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
    ports:
      - "8950:8848"
      - "9848:9848"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/ns/operator/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uav-net

  mysql:
    image: mysql:8.4.7
    container_name: uav-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=nacos
      - MYSQL_USER=nacos
      - MYSQL_PASSWORD=nacos
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - uav-net

  redis:
    image: redis:7.2-alpine
    container_name: uav-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - uav-net

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: uav-kafka
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LOG_RETENTION_HOURS=24
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "19092:9092"
    depends_on:
      zookeeper:
        condition: service_started
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - uav-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.8.0
    container_name: uav-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - uav-net

  # ============================================================
  # Java 微服务
  # ============================================================
  api-gateway:
    build:
      context: .
      dockerfile: gateway/api-gateway/Dockerfile
    container_name: uav-gateway
    ports:
      - "8088:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms512m -Xmx1024m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  platform-api:
    build:
      context: .
      dockerfile: services/platform-api/Dockerfile
    container_name: uav-platform-api
    ports:
      - "8081:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  weather-api:
    build:
      context: .
      dockerfile: services/weather-api/Dockerfile
    container_name: uav-weather-api
    ports:
      - "8082:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_URL=http://algorithm-engine:9090
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_MOCK=false
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  assimilation-api:
    build:
      context: .
      dockerfile: services/assimilation-api/Dockerfile
    container_name: uav-assimilation-api
    ports:
      - "8083:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_URL=http://algorithm-engine:9090
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_MOCK=false
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  risk-api:
    build:
      context: .
      dockerfile: services/risk-api/Dockerfile
    container_name: uav-risk-api
    ports:
      - "8084:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_URL=http://algorithm-engine:9090
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  observation-api:
    build:
      context: .
      dockerfile: services/observation-api/Dockerfile
    container_name: uav-observation-api
    ports:
      - "8085:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_URL=http://algorithm-engine:9090
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_MOCK=false
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  planning-api:
    build:
      context: .
      dockerfile: services/planning-api/Dockerfile
    container_name: uav-planning-api
    ports:
      - "8086:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_URL=http://algorithm-engine:9090
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_MOCK=false
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  utm-api:
    build:
      context: .
      dockerfile: services/utm-api/Dockerfile
    container_name: uav-utm-api
    ports:
      - "8089:8080"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - uav-net

  # ============================================================
  # Python 算法引擎
  # ============================================================
  algorithm-engine:
    build:
      context: ./python/algorithm-engine
      dockerfile: Dockerfile
    container_name: uav-algorithm-engine
    ports:
      - "9095:9090"
    environment:
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ALGORITHM_ENGINE_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ALGORITHM_ENGINE_REDIS_URL=redis://redis:6379/0
      - ALGORITHM_ENGINE_NACOS_HOST=nacos
      - ALGORITHM_ENGINE_NACOS_PORT=8848
      - LOG_LEVEL=INFO
    depends_on:
      - nacos
      - redis
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - uav-net

  # ============================================================
  # 前端控制台
  # ============================================================
  console:
    build:
      context: ./console
      dockerfile: Dockerfile
    container_name: uav-console
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - uav-net

  # ============================================================
  # 监控
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: uav-prometheus
    ports:
      - "19091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - uav-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: uav-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - uav-net

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  uav-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
