            $ref: '#/components/schemas/FlightPlan'

    UavPositionReport:
      type: object
      required: [uavId, lon, lat, alt, timestamp]
      properties:
        uavId:
          type: string
          description: 无人机ID
        lon:
          type: number
          format: double
          description: 经度
        lat:
          type: number
          format: double
          description: 纬度
        alt:
          type: number
          format: double
          description: 海拔高度(m)
        speed:
          type: number
          format: double
          description: 速度(m/s)
        heading:
          type: number
          format: double
          description: 航向(deg)
        timestamp:
          type: string
          format: date-time

    UavPosition:
      type: object
      description: 无人机位置
      properties:
        id:
          type: integer
          format: int64
        uavId:
          type: string
        longitude:
          type: number
          format: double
        latitude:
          type: number
          format: double
        altitude:
          type: number
          format: double
        speed:
          type: number
          format: double
        heading:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time
        flightPlanId:
          type: integer
          format: int64

    ResultUavPosition:
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          $ref: '#/components/schemas/UavPosition'

    ResultListUavPosition:
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UavPosition'

    ConflictCheckRequest:
      type: object
      required: [uavId, plannedPath, timeWindow]
      properties:
        uavId:
          type: string
          description: 无人机ID
        plannedPath:
          type: array
          description: 计划路径点
          items:
            type: object
            properties:
              lon:
                type: number
                format: double
              lat:
                type: number
                format: double
              alt:
                type: number
                format: double
              eta:
                type: string
                format: date-time
        timeWindow:
          type: object
          description: 时间窗口
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time

    ConflictAlert:
      type: object
      description: 冲突告警
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum: [GEOFENCE, UAV]
          description: 冲突类型
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
          description: 严重程度
        involvedEntitiesJson:
          type: string
          description: 涉及实体JSON
        resolutionAdviceJson:
          type: string
          description: 解决建议JSON
        status:
          type: string
          enum: [ACTIVE, RESOLVED]
          description: 告警状态
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time

    ResultListConflictAlert:
      allOf:
        - $ref: '#/components/schemas/Result'
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ConflictAlert'

  # ----------------------------------------------------------
  # 安全认证
  # ----------------------------------------------------------
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Token 认证，用于平台管理接口

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API Key 认证，配合 HMAC 签名使用

  # ----------------------------------------------------------
  # 通用响应
  # ----------------------------------------------------------
  responses:
    Success:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResultVoid'
          example:
            code: 200
            message: success
            data: null
            timestamp: 1717200000000

    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
          example:
            code: 1000
            message: "请求参数错误"
            data: null
            timestamp: 1717200000000

    Unauthorized:
      description: 未授权，请先登录
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
          example:
            code: 1001
            message: "未授权，请先登录"
            data: null
            timestamp: 1717200000000

    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
          example:
            code: 1002
            message: "权限不足"
            data: null
            timestamp: 1717200000000

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
          example:
            code: 1003
            message: "资源不存在"
            data: null
            timestamp: 1717200000000

    InternalServerError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
          example:
            code: 2000
            message: "服务器内部错误"
            data: null
            timestamp: 1717200000000
