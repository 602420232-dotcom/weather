# ============================================================
# 组件定义
# ============================================================
components:

  # ----------------------------------------------------------
  # 通用参数
  # ----------------------------------------------------------
  parameters:
    TaskId:
      name: id
      in: path
      required: true
      description: 任务ID
      schema:
        type: integer
        format: int64

    TenantId:
      name: id
      in: path
      required: true
      description: 租户ID
      schema:
        type: integer
        format: int64

    ApiKeyId:
      name: id
      in: path
      required: true
      description: API密钥ID
      schema:
        type: integer
        format: int64

  # ----------------------------------------------------------
  # 数据模型
  # ----------------------------------------------------------
  schemas:

    # --- 统一响应 ---
    Result:
      type: object
      description: 统一API响应结构
      properties:
        code:
          type: integer
          description: 业务状态码 (200=成功)
          example: 200
        message:
          type: string
          description: 提示消息
          example: success
        data:
          description: 响应数据（泛型）
        requestId:
          type: string
          description: 请求追踪ID
        timestamp:
          type: integer
          format: int64
          description: 时间戳

    ResultVoid:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 无数据的成功响应

    ResultLong:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 包含Long类型数据的响应
      properties:
        data:
          type: integer
          format: int64
          description: 任务ID

    ResultBoolean:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 包含布尔值的响应
      properties:
        data:
          type: boolean
          description: 检查结果

    ResultObject:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 包含分页对象的响应

    ResultMap:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 包含Map数据的响应
      properties:
        data:
          type: object
          additionalProperties:
            type: object

    ResultListMap:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: 包含Map列表的响应
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties:
              type: object

    # --- 平台管理 ---
    CreateTenantRequest:
      type: object
      required: [name, schemaName]
      properties:
        name:
          type: string
          description: 租户名称
          example: "示例航空公司"
