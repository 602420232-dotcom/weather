openapi: 3.0.3
info:
  title: UAV Platform API
  version: 2.0.0
  description: |
    基于WRF气象驱动的无人机VRP智能路径规划系统 API 平台。

    ## 功能模块
    - **平台管理**: 租户管理、API密钥管理、用量统计
    - **气象数据**: WRF/风云/天姿/风雷多源气象数据查询与融合
    - **数据同化**: 3DVAR/4DVAR/5DVAR/EnKF/Hybrid/Enhanced Bayesian 同化算法
    - **风险评估**: 综合风险感知与区域风险栅格地图
    - **适航评估**: 全维度适航评估与适航标准查询
    - **观测决策**: 自适应/计划/应急观测任务管理与决策
    - **路径规划**: VRPTW/DE-RRT*/DWA/MPC/A*/Dijkstra/RRT* 路径规划
    - **UTM**: 空域管理、飞行计划、实时追踪与冲突检测

    ## 认证方式
    - **Bearer Token**: JWT 认证，用于平台管理接口
    - **API Key**: HMAC 签名认证，用于业务接口调用

  contact:
    name: UAV Platform Team
    email: support@uav-platform.example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: 开发环境（通过网关访问）
  - url: https://api.uav-platform.example.com
    description: 生产环境

tags:
  - name: Platform
    description: 平台管理（租户、API密钥、用量统计）
  - name: Weather
    description: 气象数据查询
  - name: Assimilation
    description: 数据同化任务管理
  - name: Risk
    description: 风险评估
  - name: Airworthiness
    description: 适航评估
  - name: Observation
    description: 观测任务与决策
  - name: Planning
    description: 路径规划与任务规划
  - name: UTM
    description: 空域管理、飞行计划、追踪

paths:
  # ============================================================
  # 平台管理
  # ============================================================
  /api/v1/platform/tenants:
    post:
      tags: [Platform]
      summary: 创建租户
      description: 创建新的租户账户，包含名称、数据库Schema和配额配置。
      operationId: createTenant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
            example:
              name: "示例航空公司"
              schemaName: "tenant_airline_01"
              quotaConfig: '{"maxUavs": 50, "maxApiCallsPerDay": 10000}'
      responses:
        '200':
          description: 租户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultTenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Platform]
      summary: 分页查询租户列表
      description: 分页获取所有租户信息。
      operationId: listTenants
      security:
        - BearerAuth: []
      parameters:
        - name: current
          in: query
          description: 当前页码
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页大小
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPageTenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/platform/tenants/{id}:
    get:
      tags: [Platform]
      summary: 获取租户详情
      description: 根据ID获取租户详细信息。
      operationId: getTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultTenant'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Platform]
      summary: 更新租户信息
      description: 更新指定租户的名称和配额配置。
      operationId: updateTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTenantRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Platform]
      summary: 删除租户
      description: 删除指定租户及其所有关联数据。
      operationId: deleteTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/tenants/{id}/disable:
    post:
      tags: [Platform]
      summary: 禁用租户
      description: 禁用指定租户，禁用后该租户无法访问任何API。
      operationId: disableTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/tenants/{id}/enable:
    post:
      tags: [Platform]
      summary: 启用租户
      description: 重新启用已禁用的租户。
      operationId: enableTenant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/api-keys:
    post:
      tags: [Platform]
      summary: 生成API密钥
      description: 为指定租户生成新的API密钥，支持配置速率限制和有效期。
      operationId: generateApiKey
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateApiKeyRequest'
            example:
              tenantId: 1
              name: "生产环境密钥"
              rateLimit: 1000
              expiresInDays: 365
      responses:
        '200':
          description: 密钥生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultApiKey'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/platform/api-keys/{id}:
    get:
      tags: [Platform]
      summary: 获取API密钥详情
      description: 根据ID获取API密钥详细信息。
      operationId: getApiKey
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultApiKey'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Platform]
      summary: 删除API密钥
      description: 删除指定的API密钥。
      operationId: deleteApiKey
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/platform/api-keys/{id}/enable:
    post:
      tags: [Platform]
      summary: 启用API密钥
      description: 启用已禁用的API密钥。
      operationId: enableApiKey
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/v1/platform/api-keys/{id}/disable:
    post:
      tags: [Platform]
      summary: 禁用API密钥
      description: 禁用指定的API密钥。
      operationId: disableApiKey
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ApiKeyId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/v1/platform/api-keys/tenant/{tenantId}:
    get:
      tags: [Platform]
      summary: 查询租户的API密钥列表
      description: 获取指定租户下所有API密钥。
      operationId: listApiKeysByTenant
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListApiKey'

  /api/v1/platform/usage/daily:
    get:
      tags: [Platform]
      summary: 每日用量聚合
      description: 查询指定租户在时间范围内的每日API调用用量统计。
      operationId: getDailyUsage
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          description: 开始日期 (yyyy-MM-dd)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          description: 结束日期 (yyyy-MM-dd)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListMap'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/platform/usage/api-path:
    get:
      tags: [Platform]
      summary: API路径用量聚合
      description: 按API路径维度聚合用量统计。
      operationId: getApiPathUsage
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListMap'

  # ============================================================
  # 气象数据
  # ============================================================
  /api/v1/weather/point:
    post:
      tags: [Weather]
      summary: 单点气象查询
      description: 查询指定经纬度坐标的气象数据，支持指定数据源、海拔高度和预报时间。
      operationId: queryWeatherPoint
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeatherQueryRequest'
            example:
              longitude: 116.4074
              latitude: 39.9042
              altitude: 100.0
              source: "WRF"
              forecastTime: "2025-06-01T12:00:00"
              radius: 5000
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWeatherGrid'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/weather/region:
    get:
      tags: [Weather]
      summary: 区域气象格点查询
      description: 查询指定矩形区域内的气象格点数据，返回多个格点的气象信息。
      operationId: queryWeatherRegion
      security:
        - ApiKeyAuth: []
      parameters:
        - name: minLon
          in: query
          required: true
          description: 最小经度
          schema:
            type: number
            format: double
        - name: minLat
          in: query
          required: true
          description: 最小纬度
          schema:
            type: number
            format: double
        - name: maxLon
          in: query
          required: true
          description: 最大经度
          schema:
            type: number
            format: double
        - name: maxLat
          in: query
          required: true
          description: 最大纬度
          schema:
            type: number
            format: double
        - name: altitude
          in: query
          required: false
          description: 海拔高度(m)
          schema:
            type: number
            format: double
        - name: source
          in: query
          required: false
          description: 数据源 (WRF/FENGWU_GHR/TIANZI/FENGLEI)
          schema:
            type: string
        - name: forecastTime
          in: query
          required: false
          description: 预报时间
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListWeatherGrid'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/weather/wind-profile:
    post:
      tags: [Weather]
      summary: 风场剖面查询
      description: 查询指定位置的风场垂直剖面数据，包含各高度层的风速、风向、垂直风速和湍流强度。
      operationId: queryWindProfile
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WindProfileQueryRequest'
            example:
              longitude: 116.4074
              latitude: 39.9042
              minAltitude: 0.0
              maxAltitude: 1000.0
              interval: 50.0
              source: "WRF"
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWindProfile'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/weather/fusion:
    post:
      tags: [Weather]
      summary: 多源融合气象查询
      description: 融合WRF、风云、天姿、风雷等多源气象数据进行查询，提供更高精度的气象信息。
      operationId: queryWeatherFusion
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeatherQueryRequest'
            example:
              longitude: 116.4074
              latitude: 39.9042
              radius: 5000
      responses:
        '200':
          description: 融合查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultWeatherGrid'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # 数据同化
  # ============================================================
  /api/v1/assimilation/tasks:
    get:
      tags: [Assimilation]
      summary: 查询同化任务列表
      description: 分页查询数据同化任务列表，支持按状态和算法类型过滤。
      operationId: listAssimilationTasks
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: 任务状态 (QUEUED/RUNNING/SUCCESS/FAILED/TIMEOUT/CANCELLED)
          schema:
            type: string
        - name: algorithmType
          in: query
          required: false
          description: 算法类型 (3DVAR/4DVAR/5DVAR/ENKF/HYBRID/ENHANCED_BAYESIAN)
          schema:
            type: string
        - name: current
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultObject'

    post:
      tags: [Assimilation]
      summary: 提交同化任务
      description: 提交数据同化任务，支持3DVAR、4DVAR、5DVAR、EnKF、Hybrid和Enhanced Bayesian算法。
      operationId: submitAssimilationTask
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitTaskRequest'
            example:
              algorithmType: "5DVAR"
              tenantId: 1
              params:
                maxIterations: 50
                convergenceThreshold: 0.001
      responses:
        '200':
          description: 任务提交成功，返回任务ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultLong'
        '400':
          $ref: '#/components/responses/BadRequest'
        '1006':
          description: 请求过于频繁
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultVoid'

  /api/v1/assimilation/tasks/{id}:
    get:
      tags: [Assimilation]
      summary: 查询同化任务状态
      description: 根据任务ID查询数据同化任务的当前状态、进度等信息。
      operationId: getAssimilationTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultAssimilationTask'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/assimilation/tasks/{id}/result:
    get:
      tags: [Assimilation]
      summary: 查询同化任务结果
      description: 获取已完成同化任务的分析场数据、不确定性估计和收敛信息。
      operationId: getAssimilationResult
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultAssimilationResult'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/assimilation/tasks/{id}/cancel:
    post:
      tags: [Assimilation]
      summary: 取消同化任务
      description: 取消正在运行或排队中的同化任务。
      operationId: cancelAssimilationTask
      security:
        - ApiKeyAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # 风险评估
  # ============================================================
  /api/v1/risk/assess:
    post:
      tags: [Risk]
      summary: 综合风险评估
      description: 对指定位置进行综合风险评估，考虑气象、地形、空域、设备等多维度风险因子。
      operationId: assessRisk
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskQueryRequest'
            example:
              longitude: 116.4074
              latitude: 39.9042
              altitude: 100.0
              uavModel: "DJI-M300"
              missionType: "INSPECTION"
      responses:
        '200':
          description: 评估成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultRiskAssessment'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/risk/map:
    get:
      tags: [Risk]
      summary: 区域风险栅格地图
      description: 生成指定矩形区域的风险栅格地图，用于可视化展示风险分布。
      operationId: generateRiskMap
      security:
        - ApiKeyAuth: []
      parameters:
        - name: minLon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: minLat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: maxLon
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: maxLat
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: resolution
          in: query
          required: false
          description: 栅格分辨率(度)
          schema:
            type: number
            format: double
            default: 0.01
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListRiskAssessment'

  /api/v1/risk/history:
    get:
      tags: [Risk]
      summary: 历史风险评估记录
      description: 查询历史风险评估记录，支持按租户和风险类型过滤。
      operationId: getRiskHistory
      security:
        - ApiKeyAuth: []
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: type
          in: query
          required: false
          description: 风险类型 (WEATHER/TERRAIN/AIRSPACE/EQUIPMENT/COMPOSITE)
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultListRiskAssessment'

  # ============================================================
  # 适航评估
  # ============================================================
  /api/v1/airworthiness/assess:
    post:
      tags: [Airworthiness]
      summary: 全维度适航评估
      description: 对指定无人机型号在当前气象条件下进行全维度适航评估，包含气象、结构、动力、通信、任务五个维度。
      operationId: assessAirworthiness
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
