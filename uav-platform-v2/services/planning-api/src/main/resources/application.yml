server:
  port: 8086

spring:
  application:
    name: planning-api

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/uav_planning?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:rootpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  profiles:
    include: kafka

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

uav:
  mock:
    enabled: ${MOCK_ENABLED:true}
  kafka:
    mock: ${KAFKA_MOCK:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.uav.planning: INFO
    org.springframework.web: WARN
