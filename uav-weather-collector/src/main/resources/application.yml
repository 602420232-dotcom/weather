server:
  port: 8086
  ssl:
    enabled: ${SSL_ENABLED:false}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/uav_weather?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:uav}
    password: ${DB_PASSWORD:uav123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.redis.RedisReactiveHealthIndicatorAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    timeout: 3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.uav.weather: INFO

uav:
  jwt:
    secret: dThpc3RhbmRvbmx5Zm9ydGVzdGluZzM2MmJ5dGVzbG9uZ3NlY3JldGtleQ==
