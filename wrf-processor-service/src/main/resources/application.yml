spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: wrf-processor-service
  autoconfigure:
    exclude:
      - io.github.resilience4j.bulkhead.autoconfigure.BulkheadAutoConfiguration
      - io.github.resilience4j.timelimiter.autoconfigure.TimeLimiterAutoConfiguration
  
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/wrf_processor?useSSL=false&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

# 服务器配置
server:
  port: 8081

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: dThpc3RhbmRvbmx5Zm9ydGVzdGluZzM2MmJ5dGVzbG9uZ3NlY3JldGtleQ==

# WRF处理器配置
wrf:
  python-script: wrf_processor.py
  data-path: ./data
  timeout: 30000
  cache:
    enabled: true
    ttl-seconds: 300
    max-size: 100

# 性能配置 - 线程池
task-execution:
  pool:
    core-size: 4
    max-size: 20
    queue-capacity: 200

# 日志配置
logging:
  level:
    com.uav.wrf: INFO
    org.springframework: WARN