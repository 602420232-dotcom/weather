spring:
  application:
    name: wrf-processor-service
  
  # 閺佺増宓佹惔鎾诲帳缂?
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/wrf_processor?useSSL=false&requireSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA闁板秶鐤?
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # 閺傚洣娆㈡稉濠佺炊闂勬劕鍩楅敍鍦礡F NetCDF4閺傚洣娆㈤崣顖濆厴瀵板牆銇囬敍?
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 4GB

# 閺堝秴濮熼崳銊╁帳缂?
server:
  port: 8081
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-alias: ${SSL_KEY_ALIAS:}

# Actuator 閸嬨儱鎮嶅Λ鈧弻?
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# WRF闁板秶鐤?
wrf:
  # 閺佺増宓佺捄顖氱窞
  data-path: ${user.dir}/data/wrf
  # Python閼存碍婀扮捄顖氱窞
  python-script: ${user.dir}/src/main/python/wrf_processor.py
  # 婢跺嫮鎮婄搾鍛閺冨爼妫?
  timeout: 60000
